name: Build APK (Movienaitor mobile)

# Costruisce l'APK di debug in cloud. Si avvia a mano (Actions → Run workflow)
# oppure a ogni push che tocca app-mobile/.
on:
  workflow_dispatch:
  push:
    paths:
      - 'app-mobile/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java (per Gradle/AGP)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installa dipendenze
        run: npm install

      - name: Aggiungi piattaforma Android
        run: npx cap add android

      - name: Inietta il plugin nativo (SAF)
        run: node scripts/patch-android.js

      - name: Genera le sorgenti icona/splash
        run: node scripts/make-icon.js

      - name: Applica icone e splash al progetto Android
        run: npx @capacitor/assets generate --android

      - name: Sync (copia web + plugin nel progetto Android)
        run: npx cap sync android

      - name: Build APK di debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Pubblica l'APK come artifact
        uses: actions/upload-artifact@v4
        with:
          name: movienaitor-apk
          path: app-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
